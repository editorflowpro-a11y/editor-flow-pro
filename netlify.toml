[build]
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# ── CLEAN URLS (remove .html da barra de endereços) ─────────────
# Passo 1 — redireciona a versão .html para a URL limpa (301)
[[redirects]]
  from = "/index.html"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/login.html"
  to = "/login"
  status = 301
  force = true

[[redirects]]
  from = "/app.html"
  to = "/app"
  status = 301
  force = true

[[redirects]]
  from = "/admin.html"
  to = "/admin"
  status = 301
  force = true

[[redirects]]
  from = "/projeto.html"
  to = "/projeto"
  status = 301
  force = true

[[redirects]]
  from = "/roteiros.html"
  to = "/roteiros"
  status = 301
  force = true

[[redirects]]
  from = "/parcerias.html"
  to = "/parcerias"
  status = 301
  force = true

[[redirects]]
  from = "/termos.html"
  to = "/termos"
  status = 301
  force = true

[[redirects]]
  from = "/privacidade.html"
  to = "/privacidade"
  status = 301
  force = true

[[redirects]]
  from = "/bio.html"
  to = "/bio"
  status = 301
  force = true

[[redirects]]
  from = "/dashboard-admin.html"
  to = "/dashboard-admin"
  status = 301
  force = true

[[redirects]]
  from = "/brandkit.html"
  to = "/brandkit"
  status = 301
  force = true

# Passo 2 — serve o arquivo .html real para cada URL limpa (200 rewrite)
# O navegador vê /app, o Netlify entrega /app.html — invisível pro usuário
[[redirects]]
  from = "/login"
  to = "/login.html"
  status = 200

[[redirects]]
  from = "/app"
  to = "/app.html"
  status = 200

[[redirects]]
  from = "/admin"
  to = "/admin.html"
  status = 200

[[redirects]]
  from = "/projeto"
  to = "/projeto.html"
  status = 200

[[redirects]]
  from = "/roteiros"
  to = "/roteiros.html"
  status = 200

[[redirects]]
  from = "/parcerias"
  to = "/parcerias.html"
  status = 200

[[redirects]]
  from = "/termos"
  to = "/termos.html"
  status = 200

[[redirects]]
  from = "/privacidade"
  to = "/privacidade.html"
  status = 200

[[redirects]]
  from = "/bio"
  to = "/bio.html"
  status = 200

[[redirects]]
  from = "/dashboard-admin"
  to = "/dashboard-admin.html"
  status = 200

[[redirects]]
  from = "/brandkit"
  to = "/brandkit.html"
  status = 200

# ── BLOQUEIO DE ARQUIVOS SENSÍVEIS ──────────────────────────────
# Impede acesso público a scripts internos, mesmo que estejam na pasta.
# force = true faz o 404 ter prioridade sobre o arquivo real.

# Coringa: bloqueia QUALQUER arquivo .sql (cobre todos os scripts internos)
[[redirects]]
  from = "/*.sql"
  to = "/404.html"
  status = 404
  force = true

