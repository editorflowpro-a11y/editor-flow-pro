<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<link rel="icon" type="image/png" href="https://i.imgur.com/JvSPKKb.png"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="robots" content="noindex"/>
<title>Página não encontrada — Editor Flow Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#050914;--accent:#4a6dff;--accent-light:#6b8aff;--accent-glow:rgba(74,109,255,.4);--text:#fff;--text2:#a1a1aa;--text3:#71717a;--border:rgba(255,255,255,.08)}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px;position:relative;overflow:hidden;-webkit-font-smoothing:antialiased}
.bg-grid{position:fixed;inset:0;z-index:0;pointer-events:none;background-size:60px 60px;background-image:linear-gradient(to right,rgba(255,255,255,.04) 1px,transparent 1px),linear-gradient(to bottom,rgba(255,255,255,.04) 1px,transparent 1px);-webkit-mask-image:radial-gradient(ellipse 80% 60% at center,#000 0%,transparent 80%);mask-image:radial-gradient(ellipse 80% 60% at center,#000 0%,transparent 80%)}
.glow{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:600px;height:400px;background:radial-gradient(ellipse,rgba(74,109,255,.18) 0%,transparent 70%);pointer-events:none;z-index:0}
.content{position:relative;z-index:1;animation:fadeUp 1s cubic-bezier(.16,1,.3,1) both}
@keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
.code{font-size:clamp(90px,18vw,180px);font-weight:900;letter-spacing:-6px;line-height:1;background:linear-gradient(180deg,#fff 0%,#71717a 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 12px 24px rgba(255,255,255,.08))}
.title{font-family:'Instrument Serif',serif;font-style:italic;font-size:clamp(26px,4vw,40px);color:var(--text2);margin:8px 0 16px}
.desc{font-size:15px;color:var(--text3);font-weight:300;max-width:420px;margin:0 auto 36px;line-height:1.7}
.actions{display:flex;gap:14px;justify-content:center;flex-wrap:wrap}
.btn-light{background:linear-gradient(180deg,#fff 0%,#e2e8f0 100%);color:#0f172a;padding:14px 28px;border-radius:100px;font-size:14px;font-weight:700;text-decoration:none;display:inline-flex;align-items:center;gap:8px;box-shadow:0 0 0 1px rgba(0,0,0,.05),0 12px 24px -4px rgba(0,0,0,.4),inset 0 1px 1px rgba(255,255,255,1);transition:transform .25s cubic-bezier(.25,1,.5,1)}
.btn-light:hover{transform:translateY(-2px)}
.btn-ghost{background:rgba(255,255,255,.04);color:var(--text);border:1px solid var(--border);padding:14px 28px;border-radius:100px;font-size:14px;font-weight:600;text-decoration:none;transition:all .25s}
.btn-ghost:hover{border-color:var(--accent);transform:translateY(-2px)}
.logo{position:fixed;top:28px;left:50%;transform:translateX(-50%);z-index:1}
.logo img{height:34px}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="glow"></div>
<a href="/" class="logo"><img src="https://i.imgur.com/MQX8YTJ.png" alt="Editor Flow Pro"/></a>
<div class="content">
  <div class="code">404</div>
  <div class="title">página não encontrada</div>
  <p class="desc">O link que você seguiu pode estar quebrado ou a página foi removida.</p>
  <div class="actions">
    <a href="/" class="btn-light">
      Voltar ao início
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    </a>
    <a href="/login.html" class="btn-ghost">Entrar na conta</a>
  </div>
</div>
</body>
</html>
