<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<link rel="icon" type="image/png" href="https://i.imgur.com/JvSPKKb.png"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Bio — Editor Flow Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--accent:#4a6dff;--bg:#050914;--bg2:#0a101d;--text:#fff;--text2:#a1a1aa;--text3:#71717a;--border:rgba(255,255,255,.1);--green:#10b981;--red:#ef4444}
html{scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;position:relative;overflow-x:hidden}
.bg-glow{position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(circle 520px at 50% -8%,color-mix(in srgb,var(--accent) 28%,transparent) 0%,transparent 70%)}
.bg-grid{position:fixed;inset:0;z-index:0;pointer-events:none;background-size:54px 54px;background-image:linear-gradient(to right,rgba(255,255,255,.035) 1px,transparent 1px),linear-gradient(to bottom,rgba(255,255,255,.035) 1px,transparent 1px);-webkit-mask-image:radial-gradient(ellipse 80% 55% at center top,#000,transparent 75%);mask-image:radial-gradient(ellipse 80% 55% at center top,#000,transparent 75%)}
.wrap{position:relative;z-index:1;max-width:480px;margin:0 auto;padding:48px 20px 60px;display:flex;flex-direction:column;align-items:center;text-align:center}
.avatar{width:104px;height:104px;border-radius:50%;object-fit:cover;border:3px solid color-mix(in srgb,var(--accent) 60%,transparent);box-shadow:0 0 40px -6px color-mix(in srgb,var(--accent) 60%,transparent);display:flex;align-items:center;justify-content:center;font-size:38px;font-weight:800;background:linear-gradient(135deg,var(--accent),#0a101d);color:#fff;overflow:hidden}
.pname{font-size:26px;font-weight:800;letter-spacing:-.5px;margin-top:18px}
.pbio{font-size:14px;color:var(--text2);font-weight:300;line-height:1.6;margin-top:8px;max-width:380px}
.links{width:100%;display:flex;flex-direction:column;gap:12px;margin-top:28px}
.link-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:15px 18px;border-radius:14px;background:rgba(255,255,255,.04);border:1px solid var(--border);color:#fff;text-decoration:none;font-size:14px;font-weight:600;transition:all .2s}
.link-btn:hover{transform:translateY(-2px);border-color:color-mix(in srgb,var(--accent) 55%,transparent);background:color-mix(in srgb,var(--accent) 12%,transparent);box-shadow:0 10px 30px -10px color-mix(in srgb,var(--accent) 60%,transparent)}
.link-btn svg{width:18px;height:18px;flex-shrink:0}
.lead-card{width:100%;margin-top:30px;background:linear-gradient(145deg,rgba(255,255,255,.04),rgba(255,255,255,.01)),var(--bg2);border:1px solid var(--border);border-radius:20px;padding:24px 22px;text-align:left}
.lead-title{font-size:16px;font-weight:700;text-align:center}
.lead-sub{font-size:12px;color:var(--text3);text-align:center;margin:5px 0 18px}
.fg{margin-bottom:12px}
.fl{display:block;font-size:11px;font-weight:600;letter-spacing:.4px;text-transform:uppercase;color:var(--text2);margin-bottom:6px}
.fi{width:100%;padding:12px 14px;border-radius:11px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.03);color:#fff;font-size:14px;font-family:'Inter',sans-serif;outline:none;transition:border-color .2s}
.fi:focus{border-color:var(--accent)}
.fi::placeholder{color:var(--text3)}
.lead-btn{width:100%;margin-top:6px;padding:14px;border:none;border-radius:100px;background:var(--accent);color:#fff;font-family:'Inter',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 10px 28px -8px color-mix(in srgb,var(--accent) 70%,transparent)}
.lead-btn:hover{transform:translateY(-1px)}
.lead-btn:disabled{opacity:.6;cursor:not-allowed}
.lead-msg{padding:11px 14px;border-radius:10px;font-size:13px;margin-top:12px;display:none;text-align:center}
.lead-msg.ok{display:block;background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.3);color:#6ee7b7}
.lead-msg.err{display:block;background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);color:#fca5a5}
.spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.foot{margin-top:34px;font-size:11px;color:var(--text3)}
.foot a{color:var(--text2);text-decoration:none;font-weight:600}
.state{min-height:60vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;text-align:center;color:var(--text2)}
.state .big{font-family:'Instrument Serif',serif;font-style:italic;font-size:30px;color:#fff}
@media(max-width:420px){.wrap{padding:34px 16px 50px}.pname{font-size:23px}}
</style>
</head>
<body>
<div class="bg-glow"></div>
<div class="bg-grid"></div>
<div id="root">
  <div class="state"><div class="spinner"></div><div>Carregando…</div></div>
</div>

<script>
const SB_URL='https://svcglbkbwjovxswlpkrh.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN2Y2dsYmtid2pvdnhzd2xwa3JoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwMjE5NjYsImV4cCI6MjA5NTU5Nzk2Nn0.QcBFJWS3kk-WMKvSEQXTiSWpYUE_Rw2Mvz8WoC075gs';
const sb=supabase.createClient(SB_URL,SB_KEY);
const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const ini=n=>!n?'?':n.trim().split(/\s+/).map(w=>w[0]).join('').toUpperCase().slice(0,2);
const onlyDigits=s=>String(s||'').replace(/\D/g,'');
const ICON={
  portfolio:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>',
  instagram:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><line x1="17.5" y1="6.5" x2="17.5" y2="6.5"/></svg>',
  youtube:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 8a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v8a4 4 0 0 0 4 4h12a4 4 0 0 0 4-4z"/><polygon points="10 9 15 12 10 15 10 9" fill="currentColor"/></svg>',
  contato:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8z"/></svg>'
};
const LABEL={portfolio:'Portfólio',instagram:'Instagram',youtube:'YouTube',contato:'Falar no WhatsApp'};

let PERFIL=null;

function renderBio(p){
  PERFIL=p;
  document.documentElement.style.setProperty('--accent',p.cor||'#4a6dff');
  document.title=(p.nome||p.username)+' — Editor Flow Pro';
  const b=p.botoes||{};
  const links=[];
  ['portfolio','instagram','youtube'].forEach(k=>{if(b[k]&&b[k].on&&b[k].url)links.push({href:b[k].url,k});});
  if(b.contato&&b.contato.on&&p.whatsapp)links.push({href:'https://wa.me/'+onlyDigits(p.whatsapp),k:'contato'});
  const avatar=p.foto_url?`<img class="avatar" src="${esc(p.foto_url)}" alt="${esc(p.nome)}" onerror="this.outerHTML='<div class=&quot;avatar&quot;>${ini(p.nome||p.username)}</div>'"/>`:`<div class="avatar">${ini(p.nome||p.username)}</div>`;
  document.getElementById('root').innerHTML=`
  <div class="wrap">
    ${avatar}
    <div class="pname">${esc(p.nome||('@'+p.username))}</div>
    ${p.bio?`<div class="pbio">${esc(p.bio)}</div>`:''}
    ${links.length?`<div class="links">${links.map(l=>`<a class="link-btn" href="${esc(l.href)}" target="_blank" rel="noopener">${ICON[l.k]} ${LABEL[l.k]}</a>`).join('')}</div>`:''}
    <div class="lead-card">
      <div class="lead-title">Quer falar comigo?</div>
      <div class="lead-sub">Deixe seu contato que eu te chamo 👋</div>
      <form onsubmit="enviarLead(event)">
        <div class="fg"><label class="fl">Nome *</label><input class="fi" id="l-nome" placeholder="Seu nome" required></div>
        <div class="fg"><label class="fl">Email</label><input class="fi" id="l-email" type="email" placeholder="seu@email.com"></div>
        <div class="fg"><label class="fl">Telefone / WhatsApp</label><input class="fi" id="l-tel" placeholder="(00) 00000-0000"></div>
        <button class="lead-btn" id="l-btn" type="submit">Enviar contato</button>
        <div class="lead-msg" id="l-msg"></div>
      </form>
    </div>
    <div class="foot">Feito com <a href="/">Editor Flow Pro</a></div>
  </div>`;
}

function renderState(big,small){
  document.getElementById('root').innerHTML=`<div class="state"><div class="big">${big}</div><div>${small}</div><div class="foot" style="margin-top:18px">Feito com <a href="/">Editor Flow Pro</a></div></div>`;
}

async function enviarLead(e){
  e.preventDefault();
  const nome=document.getElementById('l-nome').value.trim();
  const email=document.getElementById('l-email').value.trim();
  const telefone=document.getElementById('l-tel').value.trim();
  const msg=document.getElementById('l-msg'),btn=document.getElementById('l-btn');
  if(!nome){return;}
  btn.disabled=true;btn.innerHTML='<div class="spinner"></div> Enviando…';
  const {error}=await sb.from('leads').insert({user_id:PERFIL.user_id,username:PERFIL.username,nome,email:email||null,telefone:telefone||null});
  btn.disabled=false;btn.textContent='Enviar contato';
  if(error){msg.className='lead-msg err';msg.textContent='Não foi possível enviar agora. Tente novamente.';return;}
  document.getElementById('l-nome').value='';document.getElementById('l-email').value='';document.getElementById('l-tel').value='';
  msg.className='lead-msg ok';msg.textContent='✓ Contato enviado! Em breve falo com você.';
}

async function loadBio(){
  const u=new URLSearchParams(location.search).get('u');
  if(!u){renderState('Sem usuário','Use o link no formato /bio.html?u=seu_username');return;}
  const {data,error}=await sb.from('perfis').select('*').eq('username',u).maybeSingle();
  if(error){renderState('Ops','Não foi possível carregar esta página agora.');return;}
  if(!data){renderState('Não encontrado','Esta bio não existe ou ainda não foi publicada.');return;}
  renderBio(data);
}
loadBio();
</script>
</body>
</html>
