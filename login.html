<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<link rel="icon" type="image/png" href="https://i.imgur.com/JvSPKKb.png"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Editor Flow Pro — Login</title>

<!-- PWA -->
<link rel="manifest" href="/manifest.json"/>
<meta name="theme-color" content="#4a6dff"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Editor Flow"/>
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#050914;--bg2:#0a101d;--card-blue:#162c6d;--card-deep:#0a101d;
  --accent:#4a6dff;--accent-light:#6b8aff;--accent-glow:rgba(74,109,255,.4);
  --text:#ffffff;--text2:#a1a1aa;--text3:#71717a;
  --border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.14);
  --green:#10b981;--red:#ef4444;
}
html{scroll-behavior:smooth}
body{
  font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  position:relative;overflow-x:hidden;padding:28px 20px;-webkit-font-smoothing:antialiased;
}
/* ─── BACKDROP: grid + grain + glow orbs (identidade index) ─── */
.bg-grid{position:fixed;inset:0;z-index:0;pointer-events:none;background-size:60px 60px;
  background-image:linear-gradient(to right,rgba(255,255,255,.04) 1px,transparent 1px),linear-gradient(to bottom,rgba(255,255,255,.04) 1px,transparent 1px);
  -webkit-mask-image:radial-gradient(ellipse 80% 60% at center top,#000 0%,transparent 80%);
  mask-image:radial-gradient(ellipse 80% 60% at center top,#000 0%,transparent 80%)}
body::after{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.04;mix-blend-mode:overlay;
  background-image:url("data:image/svg+xml;utf8,<svg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>")}
.orb{position:fixed;border-radius:50%;pointer-events:none;z-index:0;filter:blur(8px)}
.orb1{width:640px;height:640px;background:radial-gradient(circle,rgba(74,109,255,.20) 0%,transparent 65%);top:50%;left:50%;transform:translate(-50%,-50%)}
.orb2{width:340px;height:340px;background:radial-gradient(circle,rgba(107,138,255,.12) 0%,transparent 65%);top:12%;right:6%}

/* ─── CARD ─── */
.card{
  background:linear-gradient(145deg,rgba(255,255,255,.04) 0%,rgba(255,255,255,.01) 100%),var(--bg2);
  border:1px solid var(--border);border-radius:24px;padding:44px 40px;
  width:100%;max-width:430px;position:relative;z-index:1;
  box-shadow:0 0 0 1px rgba(74,109,255,.06),0 30px 80px -20px rgba(0,0,0,.8),inset 0 1px 0 rgba(255,255,255,.06);
}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:28px;justify-content:center;text-decoration:none}
.logo img{height:30px;width:auto}
.logo-text{font-family:'Inter',sans-serif;font-weight:800;font-size:18px;letter-spacing:-.4px;text-transform:uppercase;color:var(--text)}
.logo-text em{font-style:normal;color:var(--accent-light);text-shadow:0 0 18px var(--accent-glow)}
.title{font-family:'Inter',sans-serif;font-weight:800;font-size:30px;letter-spacing:-1px;text-align:center;margin-bottom:8px;line-height:1.1}
.title .italic{font-family:'Instrument Serif',serif;font-style:italic;font-weight:400;letter-spacing:0;color:var(--accent-light)}
.subtitle{font-size:14px;color:var(--text2);text-align:center;margin-bottom:28px;font-weight:300}

/* ─── GOOGLE BUTTON (pílula branca, igual CTA do index) ─── */
.btn-google{
  width:100%;padding:13px;border-radius:100px;border:none;cursor:pointer;
  font-family:'Inter',sans-serif;font-size:14px;font-weight:700;color:#0F172A;
  background:linear-gradient(180deg,#FFFFFF 0%,#E2E8F0 100%);
  display:flex;align-items:center;justify-content:center;gap:10px;
  box-shadow:0 0 0 1px rgba(0,0,0,.05),0 2px 4px rgba(0,0,0,.2),0 12px 24px -4px rgba(0,0,0,.4),inset 0 1px 1px rgba(255,255,255,1);
  transition:all .25s cubic-bezier(.25,1,.5,1);
}
.btn-google:hover{transform:translateY(-2px)}
.btn-google:disabled{opacity:.7;cursor:not-allowed;transform:none}

/* ─── DIVIDER ─── */
.divider{display:flex;align-items:center;gap:12px;margin:22px 0;color:var(--text3);font-size:12px;font-weight:500}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}

/* ─── TABS ─── */
.tabs{display:flex;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:100px;padding:4px;margin-bottom:22px}
.tab{flex:1;padding:9px;border-radius:100px;font-size:13px;font-weight:600;cursor:pointer;color:var(--text2);border:none;background:none;font-family:'Inter',sans-serif;transition:all .2s;text-align:center}
.tab.active{background:linear-gradient(180deg,var(--accent-light),var(--accent));color:#fff;box-shadow:0 6px 18px -6px var(--accent-glow)}

/* ─── FORMS ─── */
.form-g{margin-bottom:15px}
.form-l{display:block;font-size:11px;font-weight:600;letter-spacing:.5px;color:var(--text2);margin-bottom:6px;text-transform:uppercase}
.form-i{width:100%;padding:13px 16px;border-radius:12px;border:1px solid var(--border2);background:rgba(255,255,255,.03);color:var(--text);font-size:14px;font-family:'Inter',sans-serif;transition:border-color .2s,box-shadow .2s;outline:none}
.form-i:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(74,109,255,.15)}
.form-i::placeholder{color:var(--text3)}

.btn{width:100%;padding:14px;background:linear-gradient(180deg,var(--accent-light),var(--accent));color:#fff;border:none;border-radius:100px;font-family:'Inter',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;margin-top:4px;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 8px 24px -6px var(--accent-glow),inset 0 1px 0 rgba(255,255,255,.2)}
.btn:hover{transform:translateY(-1px);box-shadow:0 12px 30px -6px var(--accent-glow),inset 0 1px 0 rgba(255,255,255,.28)}
.btn:disabled{opacity:.6;cursor:not-allowed;transform:none}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border2);box-shadow:none;margin-top:10px;font-weight:600}
.btn-ghost:hover{background:rgba(255,255,255,.04);border-color:var(--accent);color:var(--text);box-shadow:none}

.spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.msg{padding:12px 16px;border-radius:10px;font-size:13px;margin-bottom:16px;display:none;line-height:1.45}
.msg.error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);color:#fca5a5}
.msg.success{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.25);color:#6ee7b7}
.msg.show{display:block}

.form-panel{display:none}
.form-panel.active{display:block;animation:fade .25s}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

.foot{text-align:center;margin-top:24px;font-size:13px;color:var(--text2)}
.foot a{color:var(--accent-light);text-decoration:none;font-weight:600}
.foot a:hover{text-decoration:underline}

/* ─── RESPONSIVO ─── */
@media(max-width:480px){
  body{padding:18px 14px}
  .card{padding:32px 22px;border-radius:20px}
  .title{font-size:26px}
  .orb1{width:420px;height:420px}
}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="orb orb1"></div>
<div class="orb orb2"></div>

<div class="card">
  <a class="logo" href="/index.html">
    <img src="https://i.imgur.com/MQX8YTJ.png" alt="Editor Flow Pro"/>
  </a>

  <h1 class="title">Bem-vindo <span class="italic">de volta</span></h1>
  <p class="subtitle">Entre, crie sua conta grátis ou receba um link de acesso</p>

  <!-- GOOGLE -->
  <button class="btn-google" id="btn-google" onclick="loginGoogle()">
    <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3c-1.6 4.7-6.1 8-11.3 8-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.6 4.1 29.6 2 24 2 11.8 2 2 11.8 2 24s9.8 22 22 22 22-9.8 22-22c0-1.3-.1-2.3-.4-3.5z"/><path fill="#FF3D00" d="m6.3 14.7 6.6 4.8C14.7 16 19 13 24 13c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.6 6.1 29.6 4 24 4 16.3 4 9.7 8.3 6.3 14.7z" transform="translate(0 -2)"/><path fill="#4CAF50" d="M24 46c5.5 0 10.4-2.1 14.1-5.5l-6.5-5.5c-2 1.5-4.7 2.5-7.6 2.5-5.2 0-9.6-3.3-11.3-7.9l-6.5 5C9.6 41.6 16.2 46 24 46z"/><path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.2-2.2 4.1-4.1 5.5l6.5 5.5C41.4 36.3 46 31 46 24c0-1.3-.1-2.3-.4-3.5z"/></svg>
    Continuar com Google
  </button>

  <div class="divider">ou com email</div>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab active" data-tab="login" onclick="switchTab('login')">Entrar</button>
    <button class="tab" data-tab="signup" onclick="switchTab('signup')">Criar conta</button>
    <button class="tab" data-tab="magic" onclick="switchTab('magic')">Link mágico</button>
  </div>

  <!-- MSG -->
  <div class="msg" id="msg"></div>

  <!-- LOGIN COM SENHA -->
  <div class="form-panel active" id="panel-login">
    <div class="form-g">
      <label class="form-l">Email</label>
      <input class="form-i" id="login-email" type="email" placeholder="seu@email.com"/>
    </div>
    <div class="form-g">
      <label class="form-l">Senha</label>
      <input class="form-i" id="login-senha" type="password" placeholder="••••••••"
        onkeydown="if(event.key==='Enter')handleLogin()"/>
    </div>
    <button class="btn" id="btn-login" onclick="handleLogin()">
      Entrar no Editor Flow Pro
    </button>
  </div>

  <!-- CADASTRO -->
  <div class="form-panel" id="panel-signup">
    <div class="form-g">
      <label class="form-l">Nome</label>
      <input class="form-i" id="signup-nome" type="text" placeholder="Seu nome"/>
    </div>
    <div class="form-g">
      <label class="form-l">Email</label>
      <input class="form-i" id="signup-email" type="email" placeholder="seu@email.com"/>
    </div>
    <div class="form-g">
      <label class="form-l">Senha</label>
      <input class="form-i" id="signup-senha" type="password" placeholder="Crie uma senha (mín. 6 caracteres)"
        onkeydown="if(event.key==='Enter')handleSignup()"/>
    </div>
    <div class="form-g" style="margin-bottom:4px">
      <label style="display:flex;align-items:flex-start;gap:10px;cursor:pointer;font-size:12px;color:var(--text2);line-height:1.6">
        <input type="checkbox" id="signup-termos" style="margin-top:3px;accent-color:var(--accent);flex-shrink:0;width:15px;height:15px"/>
        Li e aceito os <a href="/termos.html" target="_blank" style="color:var(--accent-light);text-decoration:underline">Termos de Uso</a> e a <a href="/privacidade.html" target="_blank" style="color:var(--accent-light);text-decoration:underline">Política de Privacidade</a>
      </label>
    </div>
    <button class="btn" id="btn-signup" onclick="handleSignup()">
      Criar conta grátis
    </button>
  </div>

  <!-- MAGIC LINK -->
  <div class="form-panel" id="panel-magic">
    <div class="form-g">
      <label class="form-l">Email da conta</label>
      <input class="form-i" id="magic-email" type="email" placeholder="seu@email.com"
        onkeydown="if(event.key==='Enter')handleMagicLink()"/>
    </div>
    <button class="btn" id="btn-magic" onclick="handleMagicLink()">
      Enviar link de acesso
    </button>
  </div>

  <div class="foot">
    Quer conhecer os planos? <a href="/index.html#planos">Ver Basic, Pro e Premium →</a>
  </div>
  <div class="foot" style="margin-top:12px;font-size:11px;color:var(--text3)">
    <a href="/termos.html" target="_blank">Termos de Uso</a> · <a href="/privacidade.html" target="_blank">Política de Privacidade</a>
  </div>
</div>

<script>
// ── CONFIG SUPABASE ──
const SUPABASE_URL = 'https://svcglbkbwjovxswlpkrh.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN2Y2dsYmtid2pvdnhzd2xwa3JoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwMjE5NjYsImV4cCI6MjA5NTU5Nzk2Nn0.QcBFJWS3kk-WMKvSEQXTiSWpYUE_Rw2Mvz8WoC075gs';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

// rótulos originais dos botões (para restaurar após o loading)
const LABELS = {
  'btn-login': 'Entrar no Editor Flow Pro',
  'btn-signup': 'Criar conta grátis',
  'btn-magic': 'Enviar link de acesso'
};

// ── VERIFICA SE JÁ ESTÁ LOGADO ──
sb.auth.getSession().then(({ data }) => {
  if (data.session) verificarAcesso(data.session.user.email);
});

// ── UI ──
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.querySelectorAll('.form-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + tab).classList.add('active');
  hideMsg();
}

function showMsg(texto, tipo = 'error') {
  const el = document.getElementById('msg');
  el.textContent = texto;
  el.className = `msg ${tipo} show`;
}
function hideMsg() {
  document.getElementById('msg').className = 'msg';
}
function setLoading(btnId, loading) {
  const btn = document.getElementById(btnId);
  if (loading) {
    btn.disabled = true;
    btn.innerHTML = '<div class="spinner"></div> Aguarde...';
  } else {
    btn.disabled = false;
    btn.innerHTML = LABELS[btnId] || 'Continuar';
  }
}

// ── GOOGLE OAUTH ──
async function loginGoogle() {
  const btn = document.getElementById('btn-google');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner" style="border-color:rgba(0,0,0,.25);border-top-color:#0F172A"></div> Conectando...';
  hideMsg();
  const { error } = await sb.auth.signInWithOAuth({
    provider: 'google',
    options: {
      redirectTo: window.location.origin + '/app.html'
    }
  });
  if (error) {
    btn.disabled = false;
    btn.innerHTML = 'Continuar com Google';
    showMsg('Não foi possível conectar com o Google agora. Tente o email abaixo.');
  }
}

// ── LOGIN COM SENHA ──
async function handleLogin() {
  const email = document.getElementById('login-email').value.trim();
  const senha = document.getElementById('login-senha').value;
  if (!email || !senha) { showMsg('Preencha email e senha.'); return; }

  setLoading('btn-login', true);
  hideMsg();

  const { error } = await sb.auth.signInWithPassword({ email, password: senha });

  if (error) {
    setLoading('btn-login', false);
    showMsg('Email ou senha incorretos. Use o link mágico se não tem senha.');
    return;
  }

  await verificarAcesso(email);
  setLoading('btn-login', false);
}

// ── CADASTRO (conta grátis) ──
async function handleSignup() {
  const nome = document.getElementById('signup-nome').value.trim();
  const email = document.getElementById('signup-email').value.trim();
  const senha = document.getElementById('signup-senha').value;
  if (!email || !senha) { showMsg('Preencha email e senha.'); return; }
  if (senha.length < 6) { showMsg('A senha precisa ter pelo menos 6 caracteres.'); return; }
  if (!document.getElementById('signup-termos').checked) { showMsg('Aceite os Termos de Uso e a Política de Privacidade para continuar.'); return; }

  setLoading('btn-signup', true);
  hideMsg();

  const { data, error } = await sb.auth.signUp({
    email,
    password: senha,
    options: {
      data: { nome },
      emailRedirectTo: window.location.origin + '/app.html' + (new URLSearchParams(location.search).get('next')?'?next='+encodeURIComponent(new URLSearchParams(location.search).get('next')):'')
    }
  });

  if (error) {
    setLoading('btn-signup', false);
    showMsg(error.message.includes('registered')
      ? 'Este email já tem conta. Use a aba "Entrar".'
      : 'Não foi possível criar a conta. Tente novamente.');
    return;
  }

  // Se a confirmação de email estiver desativada, o Supabase já devolve a sessão:
  // entra direto no app (sem depender de email chegar).
  if (data && data.session) {
    await verificarAcesso(email);
    return;
  }

  // Confirmação de email ativada — precisa clicar no link recebido.
  setLoading('btn-signup', false);
  showMsg('✓ Conta criada! Confirme pelo email que enviamos para ativar o acesso. Se não chegar, fale com o suporte.', 'success');
}

// ── MAGIC LINK ──
async function handleMagicLink() {
  const email = document.getElementById('magic-email').value.trim();
  if (!email) { showMsg('Digite seu email.'); return; }

  setLoading('btn-magic', true);
  hideMsg();

  const { error } = await sb.auth.signInWithOtp({
    email,
    options: { emailRedirectTo: window.location.origin + '/app.html' }
  });

  setLoading('btn-magic', false);

  if (error) {
    showMsg('Erro ao enviar o link. Verifique o email e tente novamente.');
    return;
  }

  showMsg('✓ Link enviado! Verifique sua caixa de entrada.', 'success');
}

// ── VERIFICA ASSINATURA ATIVA (com auto-provisão) ──
async function verificarAcesso(email) {
  let { data: assinante } = await sb
    .from('assinantes')
    .select('status, fim_periodo')
    .eq('email', email)
    .maybeSingle();

  // Conta nova que ainda não tem registro de assinante? Cria um plano grátis na hora.
  // (Cobre o caso do trigger do banco não ter rodado — assim contas novas sempre entram.)
  if (!assinante) {
    await sb.from('assinantes').insert({ email, status: 'ativo', plano: 'basic' });
    ({ data: assinante } = await sb
      .from('assinantes')
      .select('status, fim_periodo')
      .eq('email', email)
      .maybeSingle());
  }

  if (!assinante) {
    await sb.auth.signOut();
    showMsg('Não foi possível liberar o acesso agora. Tente novamente em instantes.');
    return;
  }

  if (assinante.status !== 'ativo') {
    await sb.auth.signOut();
    showMsg('Sua assinatura está ' + assinante.status + '. Renove para continuar.');
    return;
  }

  // Acesso liberado — redireciona para o app (ou ?next= se vier dos botões de plano)
  const nextUrl = new URLSearchParams(location.search).get('next') || '';
  window.location.href = nextUrl.startsWith('https://pay.kiwify.com.br/') ? nextUrl : '/app.html';
}

// ── PWA: registra o service worker ──
if('serviceWorker' in navigator){window.addEventListener('load',()=>{navigator.serviceWorker.register('/sw.js').catch(()=>{});});}
</script>
</body>
</html>
